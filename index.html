<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube ループ再生</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 32px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff4444;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    button#loadBtn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #ff0000;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button#loadBtn:hover {
      background: #cc0000;
    }

    #player-wrapper {
      width: 100%;
      max-width: 860px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    #player-wrapper iframe {
      width: 100%;
      height: 100%;
    }

    #status {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #888;
      height: 20px;
    }

    #status.active {
      color: #4caf50;
    }

    #status.error {
      color: #ff6b6b;
    }

    .loop-badge {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 6px 14px;
      border-radius: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      font-size: 0.8rem;
      color: #aaa;
    }

    .loop-badge.visible {
      display: flex;
    }

    .loop-icon {
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1>YouTube ループ再生</h1>
  <p class="subtitle">URLを貼り付けて再生すると自動でループします</p>

  <div class="input-area">
    <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
    <button id="loadBtn" onclick="loadVideo()">再生</button>
  </div>

  <div id="player-wrapper">
    <div id="player"></div>
  </div>

  <div id="status"></div>
  <div class="loop-badge" id="loopBadge">
    <span class="loop-icon">🔁</span>
    <span>ループ再生中</span>
  </div>

  <script>
    var player;
    var currentVideoId = null;

    // YouTube IFrame API 読み込み
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
      // API準備完了後、プレイヤーを初期化
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: '',
        playerVars: {
          autoplay: 1,
          rel: 0,
          modestbranding: 1,
        },
        events: {
          onStateChange: onPlayerStateChange,
          onReady: onPlayerReady,
          onError: onPlayerError,
        }
      });
    }

    function onPlayerReady(event) {
      // 準備完了
    }

    function onPlayerStateChange(event) {
      // 動画が終了したら最初から再生（ループ）
      if (event.data === YT.PlayerState.ENDED) {
        player.seekTo(0);
        player.playVideo();
      }
    }

    function onPlayerError(event) {
      setStatus('動画を読み込めませんでした。URLを確認してください。', 'error');
    }

    function extractVideoId(url) {
      // 各種YouTube URL形式に対応
      var patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
      ];
      for (var i = 0; i < patterns.length; i++) {
        var match = url.match(patterns[i]);
        if (match) return match[1];
      }
      return null;
    }

    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = type || '';
    }

    function loadVideo() {
      var url = document.getElementById('urlInput').value.trim();
      if (!url) {
        setStatus('URLを入力してください。', 'error');
        return;
      }

      var videoId = extractVideoId(url);
      if (!videoId) {
        setStatus('有効なYouTube URLが見つかりませんでした。', 'error');
        return;
      }

      currentVideoId = videoId;

      var wrapper = document.getElementById('player-wrapper');
      wrapper.style.display = 'block';
      document.getElementById('loopBadge').classList.add('visible');
      setStatus('読み込み中...', '');

      if (player && player.loadVideoById) {
        player.loadVideoById(videoId, 0);
        setStatus('ループ再生しています', 'active');
      } else {
        // APIがまだ準備できていない場合、少し待ってリトライ
        var interval = setInterval(function() {
          if (player && player.loadVideoById) {
            clearInterval(interval);
            player.loadVideoById(videoId, 0);
            setStatus('ループ再生しています', 'active');
          }
        }, 300);
      }
    }

    // Enterキーで再生
    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadVideo();
    });
  </script>

</body>
</html>
